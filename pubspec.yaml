name: misskey_client
version: 1.0.0-beta.1
documentation: https://librarylibrarian.github.io/misskey_client/
environment:
  sdk: ">=3.5.0 <4.0.0"
description: A pure Dart client library for the Misskey API. Covers 25 API domains with token-based auth, automatic retry, and structured error handling.
dependencies:
  dio: ^5.9.0
  json_annotation: ^4.11.0
  logger: ^2.6.2
  meta: ^1.15.0
  retry: ^3.1.2
dev_dependencies:
  build_runner: ^2.12.2
  json_serializable: ^6.13.0
  lints: ^6.0.0
  pedantic_mono: ^1.35.0
  pubspec_dependency_sorter: ^1.0.5
  test: ^1.25.0
repository: https://github.com/LibraryLibrarian/misskey_client
topics:
  - misskey
  - fediverse
  - api-client
  - social-media
  - activitypub
